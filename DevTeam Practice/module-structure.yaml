# -----------------------------------------------------------------------------
# Specify the order of topics in the module using the paths to the content .md files. 
# -----------------------------------------------------------------------------
# Add an entry under 'files:' for each topic, in the order you want them to appear in the module.
# The 'label' values will be the name of the topic/lab the learner actually sees. 
# The 'guid' values throughout the file will be created / updated automatically - no need to specify them.
files:
  - label: "Example Topic Name"
    type: topic
    file: content/01-topic.md
    guid: ~
  - label: "Example Topic Name 2"
    type: topic
    file: content/02-topic.md
    guid: ~
  # If you have a lab based topic (type: lab) then
  # You need to specify connectivity information to the lab as shown in the example below.
  # Optionally, you can specify any resources you want the learner to have access to below that. If you don't need a resource(s), remove the 'resources:' section.
  - label: "Example Lab Static Routing"
    type: lab
    file: content/03-lab.md
    guid: ~
    connectivity:
      - lab-provisioner: htd
        lab-type: virtual
        lab-number: "1"
        lab-module-id: example-technology-fundamentals
        lab-id: example-technology-fundamentals_lab-1
    resources:
      - label: "Example Scenario-1"
        type: resource
        file: resources/lab-resource-example.md
        guid: ~
  - label: "Another Example Topic Name"
    type: topic
    file: content/04-topic.md
    guid: ~
  # If you want a post assessment for the module, add it last, like below. Otherwise, delete everything below here.
  # For the post assessment, you can have more than one form active. Add each one in the 'Forms' section below.
  - label: "Post Assessment"
    type: summarychallenge
    guid: ~
    forms:
      - label: "Form A"
        type: form
        file: content/post_assessment/01-post-assessment.md
        cut-score: 9
        status: Live # Any value other than "Live" will mark the form as inactive
        guid: ~
    # You can replace the standard templated post-assessments screens below with your own if you like. Update the files you want to use below or just keep these defaults.
    screens:
      - label: "Post Assessment"
        type: Start
        file: templates/post-assessment-intro.md
        guid: ~
      - label: "Pass Screen"
        type: Pass
        file: templates/post-assessment-pass.md
        guid: ~
      - label: "Fail Screen"
        type: Fail
        file: templates/post-assessment-fail.md
        guid: ~
    settings:
      assessment-name: "Final Exam"
      time-limit: 0
      time-per-pause: 0
      maximum-attempts: 0
      delay-between-attempts: 0
      maximum-disconnection-time: 0
      early-fail-detection: false
      certificate: false
      enable-item-navigation: false
      enable-skipping: false
      enable-detailed-results: "question-level"
      enable-immediate-results: false
      score-report-mode: "detailed"
      enable-resubmission: false
      enable-feedback: false
      enable-answers: false
      enable-hints: false
      enable-tasks: "never"
      